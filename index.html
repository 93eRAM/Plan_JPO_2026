<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Journée Portes Ouvertes du 93e RAM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
 <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #eef0f8;
      --text-muted: #7c82a8;
      --accent: #e8c547;

      --cat-activites: #3ecf8e;
      --cat-expositions: #4a9eff;
      --cat-services: #ef5b5b;

      --menu-h: 52px;
      --panel-h: 260px;
      --header-h: 48px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'tahoma', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      height: calc(var(--header-h) + env(safe-area-inset-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top) 16px 0 16px;
      flex-shrink: 0;
      z-index: 100;
    }
    header h1 {
      font-family: 'tahoma', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .legend {
      display: flex;
      gap: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── MAP ── */
    #map {
      flex: 1;
      width: 100%;
      z-index: 1;
    }

    /* ── BOTTOM PANEL ── */
    #panel {
      height: var(--panel-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 100;
    }

    /* Tabs */
    .tabs {
      display: flex;
      height: var(--menu-h);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'tahoma', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 20%; right: 20%;
      height: 2px;
      border-radius: 2px 2px 0 0;
      background: transparent;
      transition: background 0.2s;
    }
    .tab-btn.active { color: var(--text); }
    .tab-btn.active::after { background: var(--accent); }
    .tab-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    /* Stand list */
    .tab-content {
      display: none;
      overflow-y: auto;
      flex: 1;
      padding: 6px 8px;
      gap: 4px;
      flex-direction: column;
    }
    .tab-content.active { display: flex; }

    .stand-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      background: var(--surface2);
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .stand-item:hover { border-color: var(--border); }
    .stand-item.active { border-color: var(--accent); background: #22263a; }

    .stand-badge {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'tahoma', sans-serif;
      font-size: 10px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .stand-info { flex: 1; min-width: 0; }
    .stand-name {
      font-family: 'tahoma', sans-serif;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stand-desc {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .stand-num {
      font-family: 'tahoma', sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── MAP POPUP / ENCART ── */
    .stand-popup {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 160px;
      max-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .stand-popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .stand-popup-badge {
      width: 24px; height: 24px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'tahoma', sans-serif;
      font-size: 9px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .stand-popup-name {
      font-family: 'tahoma', sans-serif;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
    }
    .stand-popup-cat {
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .stand-popup-desc {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-container { background: #1a1d27; }
    .leaflet-control-zoom {
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-bottom: 1px solid var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
    .leaflet-control-attribution { display: none; }
    .leaflet-popup-content-wrapper {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none !important; }
    .leaflet-popup { bottom: 14px !important; }

    /* User location pulse */
    .user-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #fff;
      box-shadow: 0 0 0 4px rgba(232,197,71,0.3);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(232,197,71,0.3); }
      50%       { box-shadow: 0 0 0 8px rgba(232,197,71,0.08); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>Journée Portes Ouvertes<br>du 93<sup style="font-size: 0.6em;">e</sup> RAM</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--cat-activites)"></div>Activités</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cat-expositions)"></div>Expositions</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cat-services)"></div>Services</div>
  </div>
</header>

<div id="map"></div>

<div id="panel">
  <div class="tabs">
    <button class="tab-btn active" data-cat="activites" onclick="switchTab('activites')">
      <span class="tab-dot" style="background:var(--cat-activites)"></span>Activités
    </button>
    <button class="tab-btn" data-cat="expositions" onclick="switchTab('expositions')">
      <span class="tab-dot" style="background:var(--cat-expositions)"></span>Expositions
    </button>
    <button class="tab-btn" data-cat="services" onclick="switchTab('services')">
      <span class="tab-dot" style="background:var(--cat-services)"></span>Services
    </button>
  </div>
  <div id="tab-activites"   class="tab-content active"></div>
  <div id="tab-expositions" class="tab-content"></div>
  <div id="tab-services"    class="tab-content"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ═══════════════════════════════════════
//  DONNÉES — modifiez ici vos stands
// ═══════════════════════════════════════
const CENTER = [45.102395, 5.680437];
const MAX_RADIUS_M = 300;

const stands = [
  // ACTIVITÉS (01–09)
  { id: '01', nom: 'Parcours d\'obstacle', categorie: 'activites1e', description: 'Parcours avec franchissements, équilibre et coordination.', lat: 45.103456, lng: 5.679386 },
  { id: '02', nom: 'Chamboule tout', categorie: 'activites', description: 'Jeux d\'adresse où tu dois renverser une pile de boîtes avec une balle.', lat: 45.101608, lng: 5.680824 }, 
  { id: '03', nom: 'Jeux de bois', categorie: 'activites', description: 'Espace ludique proposant des jeux traditionnels d\'adresse et de précision en bois.', lat: 45.101625, lng: 5.680824 },
  { id: '04', nom: 'Circuit en véhicule militaire', categorie: 'activites1e', description: 'Parcours à bord de véhicules militaires sur un circuit aménagé.', lat: 45.102659, lng: 5.678801 },
  { id: '05', nom: 'Château gonflable', categorie: 'activites', description: 'Espace ludique réservé aux enfants, sous surveillance.', lat: 45.101716, lng: 5.680131 }, 
  { id: '06', nom: 'Escalade', categorie: 'activites1e', description: 'Mur d\'escalade avec baudrier et accompagnement par moniteurs.', lat: 45.103182, lng: 5.678819 },
  { id: '07', nom: 'Tir laser', categorie: 'activites1e', description: 'Découverte du tir laser encadrée, accessible aux enfants et aux adultes.', lat: 45.101844, lng: 5.680244 },
  { id: '08', nom: 'Vision nocturne', categorie: 'activites1e', description: 'Découverte encadrée de jumelles et dispositifs de vision nocturne.', lat: 45.102931, lng: 5.678959 },
  { id: '09', nom: 'Recherche DVA', categorie: 'activites', description: 'Démonstration de recherche de victimes d’avalanche à l’aide de détecteurs DVA.', lat: 45.103216, lng: 5.679662 },
  // EXPOSITIONS (10–23)
  { id: '10', nom: 'Présentation matériels', categorie: 'expositions', description: 'Présentation statique des principaux matériels et véhicules du régiment.', lat: 45.101459, lng: 5.681704 },
  { id: '11', nom: 'Fanfare de l\'école de l\'Artillerie', categorie: 'expositions', description: 'Fanfare militaire de l\'école de l\'Artillerie de Draguignan.', lat: 45.101707, lng: 5.681779 },
  { id: '12', nom: 'Cellule d\'appui au recrutement', categorie: 'expositions', description: 'Informations sur les parcours d\'engagement, d\'active et de réserve, au sein du 93e RAM.', lat: 45.101432, lng: 5.681467 }, 
  { id: '13', nom: 'Camion Podium du CIRFA', categorie: 'expositions', description: 'Informations sur les métiers, formations et parcours d\'engagement au sein des forces armées.', lat: 45.101282, lng: 5.681477 },
  { id: '14', nom: 'Exposition dessins au stylo bille', categorie: 'expositions', description: 'Présentation d\’œuvres réalisées au stylo bille sur le thème militaire et patrimonial.', lat: 45.101453, lng: 5.682023 },
  { id: '15', nom: 'Amicale des anciens du 93', categorie: 'expositions', description: 'Amicale des anciens du 93.', lat: 45.101518, lng: 5.682081 },
  { id: '16', nom: 'Chris Workshop', categorie: 'expositions', description: 'Présentation d\’œuvres réalisées en bois.', lat: 45.101246, lng: 5.681674 },
  { id: '17', nom: 'Les box d\'Alex', categorie: 'expositions', description: 'Présentation d\’œuvres réalisées en bois.', lat: 45.101212, lng: 5.681825 },
  //{ id: '18', nom: 'Entraide montagne', categorie: 'expositions', description: 'Association au profit des troupes de montagne.', lat: 45.101599, lng: 5.681914 },
  { id: '18', nom: 'Présentation d\'équipements et d\'armements', categorie: 'expositions', description: 'Présentation d\'équipements et d\'armements utilisés par les forces armées.', lat: 45.101554, lng: 5.681506 },
  { id: '19', nom: 'Groupement commando montagne', categorie: 'expositions', description: 'Présentation des moyens et techniques de déplacement en milieu montagneux.', lat: 45.102137, lng: 5.679639 },
  { id: '20', nom: 'Drones', categorie: 'expositions', description: 'Présentation des drones du régiment.', lat: 45.102046, lng: 5.680004 },
  { id: '21', nom: 'Matériel montagne', categorie: 'expositions', description: 'Présentation des équipements utilisés pour les missions en environnement montagneux.', lat: 45.103207, lng: 5.679476 },
  { id: '22', nom: 'PC sécurité', categorie: 'services', description: 'Contact d\'urgence : 04.56.85.75.21', lat: 45.101763, lng: 5.681794 },
  // SERVICES (24–29)
  { id: '23', nom: 'Banque', categorie: 'services', description: 'Point de paiement, achat de tickets et renseignements pratiques.', lat: 45.102179, lng: 5.681444 },
  { id: '24', nom: 'Banque', categorie: 'services', description: 'Point de paiement, achat de tickets et renseignements pratiques.', lat: 45.102267, lng: 5.679937 },
  { id: '25', nom: 'Banque', categorie: 'services', description: 'Point de paiement, achat de tickets et renseignements pratiques.', lat: 45.102144, lng: 5.681634 },
  { id: '26', nom: 'Restauration', categorie: 'services', description: 'Restauration, boissons et places assises pour les visiteurs.', lat: 45.101688, lng: 5.679801 },
  { id: '27', nom: 'Buvette', categorie: 'services', description: 'Boissons, glaces et espace de pause pour les visiteurs.', lat: 45.101448, lng: 5.679728 },
  { id: '28', nom: 'Restauration', categorie: 'services', description: 'Restauration, boissons et espace de pause pour les visiteurs.', lat: 45.101259, lng: 5.682001 },
  { id: '29', nom: 'Buvette', categorie: 'services', description: 'Boissons, glaces, crépes et espace de pause pour les visiteurs.', lat: 45.101352, lng: 5.682030 },
  { id: '30', nom: 'Équipe de secours', categorie: 'services', description: 'Présence des secouristes assurant la sécurité et la prise en charge des urgences.', lat: 45.102335, lng: 5.679895 },
];

// ═══════════════════════════════════════
//  COULEURS
// ═══════════════════════════════════════
const COLORS = {
  activites:   '#3ecf8e',
  activites1e:   '#3ecf8e',
  expositions: '#4a9eff',
  services:    '#ef5b5b',
};
const CAT_LABELS = {
  activites:   'Activité',
  activites1e:   'Activité 1€',
  expositions: 'Exposition',
  services:    'Service',
};

// ═══════════════════════════════════════
//  CARTE
// ═══════════════════════════════════════
const map = L.map('map', {
  center: CENTER,
  zoom: 17,
  zoomControl: true,
  maxBounds: [
    [CENTER[0] - 0.0027, CENTER[1] - 0.0036],
    [CENTER[0] + 0.0027, CENTER[1] + 0.0036],
  ],
  maxBoundsViscosity: 0.9,
  minZoom: 16,
  maxZoom: 19,
});

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ── Marqueur position utilisateur ──
const userIcon = L.divIcon({
  className: '',
  html: '<div class="user-dot"></div>',
  iconSize: [14, 14],
  iconAnchor: [7, 7],
});

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if (!window._userMarker) {
      window._userMarker = L.marker(ll, { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
    } else {
      window._userMarker.setLatLng(ll);
    }
  }, null, { enableHighAccuracy: true });
}

// ═══════════════════════════════════════
//  MARQUEURS STANDS
// ═══════════════════════════════════════
const markers = {};
let activePopup = null;
let activeStandId = null;

function makeStandIcon(stand, isActive) {
  const color = COLORS[stand.categorie];
  const border = isActive ? '#e8c547' : '#fff';
  const size = isActive ? 34 : 28;
  const fs = isActive ? 10 : 9;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;
      background:${color};
      border:2px solid ${border};
      border-radius:${size/2}px ${size/2}px ${size/2}px 2px;
      display:flex;align-items:center;justify-content:center;
      font-family:'tahoma',sans-serif;font-size:${fs}px;font-weight:800;
      color:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
      transform:rotate(0deg);
      transition:all .2s;
    ">${stand.id}</div>`,
    iconSize: [size, size],
    iconAnchor: [size / 2, size],
    popupAnchor: [0, -(size + 30)],
  });
}

function openStandPopup(stand) {
  const color = COLORS[stand.categorie];
  if (activePopup) { map.closePopup(activePopup); }

  // Highlight list item
  document.querySelectorAll('.stand-item').forEach(el => el.classList.remove('active'));
  const li = document.getElementById('li-' + stand.id);
  if (li) li.classList.add('active');

  // Switch tab if needed
  if (li) {
    const currentTab = document.querySelector('.tab-content.active');
    const tabCat = stand.categorie.replace('1e', '');
if (!currentTab || currentTab.id !== 'tab-' + tabCat) {
  switchTab(tabCat, false);
      li.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  // Refresh icon
  if (activeStandId && markers[activeStandId]) {
    const prev = stands.find(s => s.id === activeStandId);
    if (prev) markers[prev.id].setIcon(makeStandIcon(prev, false));
  }
  activeStandId = stand.id;
  markers[stand.id].setIcon(makeStandIcon(stand, true));

  const popupContent = `
    <div class="stand-popup">
      <div class="stand-popup-header">
        <div class="stand-popup-badge" style="background:${color}">${stand.id}</div>
        <div class="stand-popup-name">${stand.nom}</div>
      </div>
      <div class="stand-popup-cat" style="color:${color}">${CAT_LABELS[stand.categorie]}</div>
      <div class="stand-popup-desc">${stand.description}</div>
    </div>`;

  activePopup = L.popup({
    closeButton: false,
    autoClose: false,
    closeOnClick: false,
    className: 'custom-popup',
    offset: [0, -60],
    autoPan: true,
    autoPanPaddingTopLeft: [10, 60],
    autoPanPaddingBottomRight: [10, 280],
  })
    .setLatLng([stand.lat, stand.lng])
    .setContent(popupContent)
    .openOn(map);
}

stands.forEach(stand => {
  const marker = L.marker([stand.lat, stand.lng], {
    icon: makeStandIcon(stand, false),
  }).addTo(map);

  marker.on('click', () => {
    map.setView([stand.lat, stand.lng], Math.max(map.getZoom(), 18), { animate: true });
    setTimeout(() => openStandPopup(stand), 300);
  });

  markers[stand.id] = marker;
});

map.on('click', e => {
  if (!e.originalEvent.target.closest?.('.leaflet-marker-icon')) {
    if (activePopup) { map.closePopup(activePopup); activePopup = null; }
    if (activeStandId) {
      const prev = stands.find(s => s.id === activeStandId);
      if (prev) markers[prev.id].setIcon(makeStandIcon(prev, false));
      activeStandId = null;
    }
    document.querySelectorAll('.stand-item').forEach(el => el.classList.remove('active'));
  }
});

// ═══════════════════════════════════════
//  LISTE DES STANDS
// ═══════════════════════════════════════
['activites', 'expositions', 'services'].forEach(cat => {
  const container = document.getElementById('tab-' + cat);
  stands.filter(s => s.categorie === cat || s.categorie === cat + '1e').forEach(stand => {
    const color = COLORS[stand.categorie];
    const div = document.createElement('div');
    div.className = 'stand-item';
    div.id = 'li-' + stand.id;
    div.innerHTML = `
      <div class="stand-badge" style="background:${color}">${stand.id}</div>
      <div class="stand-info">
        <div class="stand-name">${stand.nom}</div>
        <div class="stand-desc">${stand.description}</div>
      </div>
      <div class="stand-num">#${stand.id}</div>`;
    div.addEventListener('click', () => {
      // D'abord zoom out pour voir tout, puis zoom sur le stand
      map.setView(CENTER, 16, { animate: true });
      setTimeout(() => {
        map.setView([stand.lat, stand.lng], 18, { animate: true });
        setTimeout(() => openStandPopup(stand), 500);
      }, 600);
    });
    container.appendChild(div);
  });
});

// ═══════════════════════════════════════
//  ONGLETS
// ═══════════════════════════════════════
function switchTab(cat, animate = true) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + cat));
}
</script>
</body>
</html>
